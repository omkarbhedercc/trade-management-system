server:
  port: 4001

spring:
  application:
    name: tms-backend
  datasource:
    url: jdbc:postgresql://localhost:4002/tms_dev
    username: tms
    password: tms
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Schema is owned by schema.sql (script init runs before Hibernate in Boot 2.3.x),
      # so Hibernate only validates entity mappings against it.
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  sql.init.mode: always
  sql.init.platform: postgresql
